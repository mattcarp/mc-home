<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claudette Home — Dashboard</title>
  <style>
    /* ─── Reset & Base ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #0a0a0a;
      --surface:      #111111;
      --surface2:     #1a1a1a;
      --border:       #222222;
      --border-soft:  #1c1c1c;
      --text:         #e8e8e8;
      --text-dim:     #666666;
      --text-muted:   #444444;
      --accent:       #c084fc;      /* purple — Claudette brand */
      --accent-glow:  rgba(192,132,252,0.15);
      --green:        #4ade80;
      --green-dim:    rgba(74,222,128,0.12);
      --yellow:       #facc15;
      --yellow-dim:   rgba(250,204,21,0.12);
      --red:          #f87171;
      --red-dim:      rgba(248,113,113,0.12);
      --blue:         #60a5fa;
      --blue-dim:     rgba(96,165,250,0.12);
      --orange:       #fb923c;
      --font-mono:    'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans:    'Inter', system-ui, -apple-system, sans-serif;
      --radius:       6px;
      --radius-lg:    12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Layout ──────────────────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 240px 1fr;
      grid-template-areas:
        "header header"
        "sidebar main";
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Header ──────────────────────────────────────────────────────────── */
    header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--text-dim); font-weight: 400; }
    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.stub { background: var(--yellow); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .time-display {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-dim);
    }
    .mode-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--yellow-dim);
      color: var(--yellow);
      border: 1px solid rgba(250,204,21,0.2);
    }

    /* ─── Sidebar ─────────────────────────────────────────────────────────── */
    .sidebar {
      grid-area: sidebar;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar-section { padding: 20px 16px 8px; }
    .sidebar-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .room-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 8px 10px;
      border-radius: var(--radius);
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font-sans);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: left;
    }
    .room-btn:hover { background: var(--surface2); color: var(--text); }
    .room-btn.active { background: var(--accent-glow); color: var(--accent); }
    .room-btn .room-icon { font-size: 14px; margin-right: 8px; }
    .room-btn .room-count {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--border);
      color: var(--text-muted);
    }
    .room-btn.active .room-count {
      background: var(--accent-glow);
      color: var(--accent);
    }
    .scene-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .scene-btn {
      padding: 8px 6px;
      border-radius: var(--radius);
      border: 1px solid var(--border-soft);
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .scene-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }
    .scene-btn .scene-icon { font-size: 16px; display: block; margin-bottom: 3px; }
    .sidebar-bottom {
      margin-top: auto;
      padding: 16px;
      border-top: 1px solid var(--border-soft);
    }
    .claudette-input-wrap {
      position: relative;
    }
    .claudette-input {
      width: 100%;
      padding: 8px 36px 8px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      font-family: var(--font-sans);
      outline: none;
      transition: border-color 0.15s;
    }
    .claudette-input:focus { border-color: var(--accent); }
    .claudette-input::placeholder { color: var(--text-muted); }
    .claudette-send {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 14px; padding: 2px;
      transition: color 0.15s;
    }
    .claudette-send:hover { color: var(--accent); }

    /* ─── Main ────────────────────────────────────────────────────────────── */
    main {
      grid-area: main;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── Summary Row ─────────────────────────────────────────────────────── */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
    }
    .summary-card .label {
      font-size: 10px;
      font-family: var(--font-mono);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .summary-card .value {
      font-size: 24px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text);
    }
    .summary-card .sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ─── Device Grid ─────────────────────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .section-action {
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      background: none; border: none;
      padding: 2px 8px;
      border-radius: 3px;
      transition: all 0.15s;
    }
    .section-action:hover { background: var(--surface2); color: var(--text-dim); }

    .device-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .device-card {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .device-card:hover { border-color: var(--border); background: var(--surface2); }
    .device-card.on { border-color: rgba(192,132,252,0.25); }
    .device-card.on::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 60%);
      pointer-events: none;
    }
    .device-icon {
      font-size: 22px;
      margin-bottom: 10px;
      display: block;
    }
    .device-name {
      font-size: 12px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 3px;
    }
    .device-area {
      font-size: 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .device-state {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .device-state-badge {
      font-size: 10px;
      font-family: var(--font-mono);
      padding: 2px 7px;
      border-radius: 3px;
    }
    .device-state-badge.on  { background: var(--accent-glow); color: var(--accent); }
    .device-state-badge.off { background: var(--border); color: var(--text-muted); }
    .device-toggle {
      width: 30px; height: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
      flex-shrink: 0;
    }
    .device-toggle.on  { background: var(--accent); }
    .device-toggle.off { background: var(--border); }
    .device-toggle::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: white;
      top: 2px;
      transition: left 0.2s;
    }
    .device-toggle.on::after  { left: 16px; }
    .device-toggle.off::after { left: 2px; }

    /* Brightness slider */
    .brightness-row {
      margin-top: 8px;
      display: none;
    }
    .device-card.on .brightness-row { display: flex; align-items: center; gap: 8px; }
    .brightness-row input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .brightness-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    .brightness-pct {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      min-width: 28px;
      text-align: right;
    }

    /* ─── Alert Log ───────────────────────────────────────────────────────── */
    .alert-list { display: flex; flex-direction: column; gap: 6px; }
    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: var(--surface);
      border-left: 3px solid var(--text-muted);
      font-size: 12px;
    }
    .alert-item.info   { border-left-color: var(--blue); }
    .alert-item.warn   { border-left-color: var(--yellow); }
    .alert-item.alert  { border-left-color: var(--red); }
    .alert-item.ok     { border-left-color: var(--green); }
    .alert-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .alert-text { flex: 1; }
    .alert-text .msg { color: var(--text); }
    .alert-text .ts  { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* ─── Conversation Log ────────────────────────────────────────────────── */
    .convo-list { display: flex; flex-direction: column; gap: 8px; }
    .convo-entry {
      padding: 10px 12px;
      border-radius: var(--radius);
      background: var(--surface);
      font-size: 12px;
    }
    .convo-entry .who {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .convo-entry .who .name { color: var(--accent); }
    .convo-entry.user .who .name { color: var(--blue); }
    .convo-entry .text { color: var(--text); }
    .convo-action {
      margin-top: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--green);
      background: var(--green-dim);
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
    }

    /* ─── Two-column lower section ────────────────────────────────────────── */
    .lower-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
    }

    /* ─── Sensor Row ──────────────────────────────────────────────────────── */
    .sensor-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .sensor-card {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 14px;
    }
    .sensor-card .icon { font-size: 18px; margin-bottom: 6px; }
    .sensor-card .val {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }
    .sensor-card .unit { font-size: 12px; color: var(--text-dim); }
    .sensor-card .name { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* ─── Responsive / Mobile ─────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; grid-template-areas: "header" "main"; }
      .sidebar { display: none; }
      .summary-row { grid-template-columns: repeat(2, 1fr); }
      .lower-grid { grid-template-columns: 1fr; }
    }

    /* ─── Scrollbar ───────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">
  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header>
    <div class="header-left">
      <div class="logo">Claudette<span>.home</span></div>
      <div class="header-status">
        <div class="status-dot stub" id="haStatusDot"></div>
        <span id="haStatusText">DEMO MODE</span>
      </div>
    </div>
    <div class="header-right">
      <div class="time-display" id="clock">—</div>
      <div style="display:flex;gap:4px;font-family:var(--font-mono);font-size:11px">
        <a href="index.html" style="padding:4px 12px;border-radius:4px;text-decoration:none;color:var(--accent);background:rgba(192,132,252,0.15)">Dashboard</a>
        <a href="floor-plan.html" style="padding:4px 12px;border-radius:4px;text-decoration:none;color:var(--text-muted);transition:all 0.15s" onmouseover="this.style.background='#1a1a1a';this.style.color='#666'" onmouseout="this.style.background='transparent';this.style.color='#444'">Floor Plan</a>
      </div>
      <div class="mode-badge">STUB</div>
    </div>
  </header>

  <!-- ── Sidebar ────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Rooms</div>
      <button class="room-btn active" onclick="filterRoom('all')">
        <span><span class="room-icon">🏠</span>All Rooms</span>
        <span class="room-count" id="countAll">14</span>
      </button>
      <button class="room-btn" onclick="filterRoom('living_room')">
        <span><span class="room-icon">🛋️</span>Living Room</span>
        <span class="room-count" id="countLiving">3</span>
      </button>
      <button class="room-btn" onclick="filterRoom('kitchen')">
        <span><span class="room-icon">🍳</span>Kitchen</span>
        <span class="room-count" id="countKitchen">3</span>
      </button>
      <button class="room-btn" onclick="filterRoom('bedroom')">
        <span><span class="room-icon">🛏️</span>Bedroom</span>
        <span class="room-count" id="countBedroom">3</span>
      </button>
      <button class="room-btn" onclick="filterRoom('entrance')">
        <span><span class="room-icon">🚪</span>Entrance</span>
        <span class="room-count" id="countEntrance">2</span>
      </button>
      <button class="room-btn" onclick="filterRoom('outdoor')">
        <span><span class="room-icon">🌿</span>Garden</span>
        <span class="room-count" id="countOutdoor">1</span>
      </button>
      <button class="room-btn" onclick="filterRoom('dining_room')">
        <span><span class="room-icon">🕯️</span>Dining Room</span>
        <span class="room-count" id="countDining">1</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Scenes</div>
      <div class="scene-grid">
        <button class="scene-btn" onclick="activateScene('dinner')">
          <span class="scene-icon">🍽️</span>Dinner
        </button>
        <button class="scene-btn" onclick="activateScene('movie_night')">
          <span class="scene-icon">🎬</span>Movie
        </button>
        <button class="scene-btn" onclick="activateScene('goodnight')">
          <span class="scene-icon">🌙</span>Goodnight
        </button>
        <button class="scene-btn" onclick="activateScene('morning')">
          <span class="scene-icon">☀️</span>Morning
        </button>
        <button class="scene-btn" onclick="activateScene('leaving')">
          <span class="scene-icon">🚶</span>Leaving
        </button>
        <button class="scene-btn" onclick="activateScene('welcome_home')">
          <span class="scene-icon">🏡</span>Welcome
        </button>
      </div>
    </div>

    <div class="sidebar-bottom">
      <div class="sidebar-label" style="margin-bottom:8px">Ask Claudette</div>
      <div class="claudette-input-wrap">
        <input class="claudette-input" id="askInput" type="text"
          placeholder="turn off the lights…"
          onkeydown="if(event.key==='Enter') sendCommand()" />
        <button class="claudette-send" onclick="sendCommand()">↵</button>
      </div>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────────────── -->
  <main>
    <!-- Summary cards -->
    <div class="summary-row">
      <div class="summary-card">
        <div class="label">Lights On</div>
        <div class="value" id="sumLightsOn">0</div>
        <div class="sub" id="sumLightsSub">of 6 total</div>
      </div>
      <div class="summary-card">
        <div class="label">Temperature</div>
        <div class="value" id="sumTemp">21°C</div>
        <div class="sub">Living room</div>
      </div>
      <div class="summary-card">
        <div class="label">Front Door</div>
        <div class="value" id="sumDoor" style="font-size:16px;margin-top:4px">—</div>
        <div class="sub" id="sumDoorSub">contact sensor</div>
      </div>
      <div class="summary-card">
        <div class="label">Last Activity</div>
        <div class="value" style="font-size:13px;margin-top:4px" id="sumActivity">—</div>
        <div class="sub">voice command</div>
      </div>
    </div>

    <!-- Lights section -->
    <div>
      <div class="section-header">
        <div class="section-title">Lights</div>
        <button class="section-action" onclick="allLightsOff()">All off</button>
      </div>
      <div class="device-grid" id="lightsGrid"></div>
    </div>

    <!-- Switches section -->
    <div>
      <div class="section-header">
        <div class="section-title">Switches & Plugs</div>
      </div>
      <div class="device-grid" id="switchesGrid"></div>
    </div>

    <!-- Sensors row + lower grid -->
    <div class="lower-grid">
      <div>
        <div class="section-header">
          <div class="section-title">Sensors</div>
        </div>
        <div class="sensor-row" id="sensorRow"></div>

        <div style="margin-top:20px">
          <div class="section-header">
            <div class="section-title">Alerts</div>
            <button class="section-action" onclick="clearAlerts()">Clear</button>
          </div>
          <div class="alert-list" id="alertList"></div>
        </div>
      </div>

      <!-- Conversation log -->
      <div>
        <div class="section-header">
          <div class="section-title">Voice Log</div>
          <button class="section-action" onclick="clearConvo()">Clear</button>
        </div>
        <div class="convo-list" id="convoList"></div>
      </div>
    </div>
  </main>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// STATE — mirrors SAMPLE_ENTITIES from ha_context.py
// ─────────────────────────────────────────────────────────────────────────────
const STATE = {
  lights: [
    { id: 'light.living_room',  name: 'Living Room',  area: 'living_room',  on: false, brightness: 80  },
    { id: 'light.bedroom',      name: 'Bedroom',       area: 'bedroom',      on: false, brightness: 60  },
    { id: 'light.kitchen',      name: 'Kitchen',       area: 'kitchen',      on: false, brightness: 100 },
    { id: 'light.dining_room',  name: 'Dining Room',   area: 'dining_room',  on: false, brightness: 70  },
    { id: 'light.garden',       name: 'Garden',        area: 'outdoor',      on: false, brightness: 50  },
    { id: 'light.hallway',      name: 'Hallway',       area: 'hallway',      on: false, brightness: 40  },
  ],
  switches: [
    { id: 'switch.tv',              name: 'TV',            area: 'living_room', on: false },
    { id: 'switch.air_conditioner', name: 'Air Con',       area: 'living_room', on: false },
    { id: 'switch.kettle',          name: 'Kettle',        area: 'kitchen',     on: false },
    { id: 'switch.fan_bedroom',     name: 'Bedroom Fan',   area: 'bedroom',     on: false },
  ],
  sensors: [
    { id: 'sensor.living_room_temperature', name: 'Temp (Living)', icon: '🌡️',  value: 21.4, unit: '°C' },
    { id: 'sensor.living_room_humidity',    name: 'Humidity',       icon: '💧',  value: 58,   unit: '%'  },
    { id: 'binary_sensor.front_door_contact', name: 'Front Door',  icon: '🚪',  value: 'closed', unit: '' },
    { id: 'binary_sensor.motion_living_room', name: 'Motion (LR)', icon: '🏃',  value: 'clear',  unit: '' },
  ],
  activeRoom: 'all',
  convo: [],
  alerts: [
    { type: 'info',  icon: '🔌', msg: 'Dashboard running in demo mode — no live HA connected.',   ts: now() },
    { type: 'ok',    icon: '✅', msg: 'All 53 pipeline tests passed (whole_home_audio, intent parser, bridge).', ts: now() },
  ],
};

function now() {
  return new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────

const ICONS = {
  light:  '💡',
  switch: '🔌',
  tv:     '📺',
  air_conditioner: '❄️',
  kettle: '☕',
  fan:    '🌀',
};

function deviceIcon(id, name) {
  if (id.includes('tv'))      return '📺';
  if (id.includes('air'))     return '❄️';
  if (id.includes('kettle'))  return '☕';
  if (id.includes('fan'))     return '🌀';
  if (id.includes('light') || id.startsWith('light.')) return '💡';
  return '🔌';
}

function renderLights() {
  const grid = document.getElementById('lightsGrid');
  const filtered = STATE.activeRoom === 'all'
    ? STATE.lights
    : STATE.lights.filter(l => l.area === STATE.activeRoom);

  grid.innerHTML = filtered.map(l => `
    <div class="device-card ${l.on ? 'on' : 'off'}" id="card_${l.id.replace(/\./g,'_')}" onclick="toggleDevice('light', '${l.id}')">
      <span class="device-icon">${l.on ? '💡' : '🔦'}</span>
      <div class="device-name">${l.name}</div>
      <div class="device-area">${l.area.replace(/_/g,' ')}</div>
      <div class="device-state">
        <span class="device-state-badge ${l.on ? 'on' : 'off'}">${l.on ? 'ON' : 'OFF'}</span>
        <button class="device-toggle ${l.on ? 'on' : 'off'}" onclick="event.stopPropagation(); toggleDevice('light','${l.id}')"></button>
      </div>
      <div class="brightness-row">
        <input type="range" min="5" max="100" value="${l.brightness}"
          oninput="setBrightness('${l.id}', this.value)"
          onclick="event.stopPropagation()" />
        <span class="brightness-pct" id="bpct_${l.id.replace(/\./g,'_')}">${l.brightness}%</span>
      </div>
    </div>
  `).join('');
}

function renderSwitches() {
  const grid = document.getElementById('switchesGrid');
  const filtered = STATE.activeRoom === 'all'
    ? STATE.switches
    : STATE.switches.filter(s => s.area === STATE.activeRoom);

  grid.innerHTML = filtered.map(s => `
    <div class="device-card ${s.on ? 'on' : 'off'}" onclick="toggleDevice('switch', '${s.id}')">
      <span class="device-icon">${deviceIcon(s.id, s.name)}</span>
      <div class="device-name">${s.name}</div>
      <div class="device-area">${s.area.replace(/_/g,' ')}</div>
      <div class="device-state">
        <span class="device-state-badge ${s.on ? 'on' : 'off'}">${s.on ? 'ON' : 'OFF'}</span>
        <button class="device-toggle ${s.on ? 'on' : 'off'}" onclick="event.stopPropagation(); toggleDevice('switch','${s.id}')"></button>
      </div>
    </div>
  `).join('');
}

function renderSensors() {
  const row = document.getElementById('sensorRow');
  row.innerHTML = STATE.sensors.map(s => `
    <div class="sensor-card">
      <div class="icon">${s.icon}</div>
      <div class="val">${typeof s.value === 'number' ? s.value : ''}<span class="unit">${s.unit}</span></div>
      ${typeof s.value === 'string' ? `<div class="val" style="font-size:14px">${s.value}</div>` : ''}
      <div class="name">${s.name}</div>
    </div>
  `).join('');
}

function renderAlerts() {
  const list = document.getElementById('alertList');
  if (!STATE.alerts.length) {
    list.innerHTML = '<div class="alert-item info"><span class="alert-icon">✨</span><div class="alert-text"><div class="msg">No active alerts</div></div></div>';
    return;
  }
  list.innerHTML = STATE.alerts.map(a => `
    <div class="alert-item ${a.type}">
      <span class="alert-icon">${a.icon}</span>
      <div class="alert-text">
        <div class="msg">${a.msg}</div>
        <div class="ts">${a.ts}</div>
      </div>
    </div>
  `).join('');
}

function renderConvo() {
  const list = document.getElementById('convoList');
  if (!STATE.convo.length) {
    list.innerHTML = `<div class="convo-entry">
      <div class="who"><span class="name">system</span> &nbsp;${now()}</div>
      <div class="text" style="color:var(--text-muted)">No voice activity yet. Try the command box →</div>
    </div>`;
    return;
  }
  list.innerHTML = [...STATE.convo].reverse().map(c => `
    <div class="convo-entry ${c.who === 'Mattie' ? 'user' : ''}">
      <div class="who"><span class="name">${c.who}</span> &nbsp;${c.ts}</div>
      <div class="text">${c.text}</div>
      ${c.action ? `<div class="convo-action">${c.action}</div>` : ''}
    </div>
  `).join('');
}

function renderSummary() {
  const onCount = STATE.lights.filter(l => l.on).length;
  document.getElementById('sumLightsOn').textContent = onCount;
  document.getElementById('sumLightsSub').textContent = `of ${STATE.lights.length} total`;

  const tempSensor = STATE.sensors.find(s => s.id.includes('temperature'));
  if (tempSensor) document.getElementById('sumTemp').textContent = `${tempSensor.value}°C`;

  const door = STATE.sensors.find(s => s.id.includes('front_door'));
  const doorEl = document.getElementById('sumDoor');
  if (door) {
    doorEl.textContent = door.value === 'open' ? 'OPEN' : 'Closed';
    doorEl.style.color = door.value === 'open' ? 'var(--red)' : 'var(--green)';
  }
}

function renderAll() {
  renderLights();
  renderSwitches();
  renderSensors();
  renderAlerts();
  renderConvo();
  renderSummary();
}

// ─────────────────────────────────────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────────────────────────────────────

function toggleDevice(type, id) {
  const arr = type === 'light' ? STATE.lights : STATE.switches;
  const d = arr.find(x => x.id === id);
  if (!d) return;
  d.on = !d.on;
  logConvo('Mattie', `${d.on ? 'Turn on' : 'Turn off'} ${d.name}`,
    `${type}.${d.on ? 'turn_on' : 'turn_off'}(${id})`);
  document.getElementById('sumActivity').textContent = now();
  renderAll();
}

function setBrightness(id, val) {
  const light = STATE.lights.find(l => l.id === id);
  if (light) {
    light.brightness = parseInt(val);
    const el = document.getElementById('bpct_' + id.replace(/\./g,'_'));
    if (el) el.textContent = val + '%';
  }
}

function allLightsOff() {
  STATE.lights.forEach(l => l.on = false);
  logConvo('Mattie', 'Turn off all lights', 'light.turn_off(all)');
  document.getElementById('sumActivity').textContent = now();
  renderAll();
}

function filterRoom(room) {
  STATE.activeRoom = room;
  document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderLights();
  renderSwitches();
}

const SCENES = {
  dinner:       { lights: ['light.dining_room','light.kitchen'], brightness: 70, msg: 'Dinner scene — warm light, kitchen bright 🍽️' },
  movie_night:  { lights: ['light.living_room'], brightness: 15, off: ['light.kitchen','light.dining_room'], msg: 'Movie night — lights dimmed 🎬' },
  goodnight:    { off_all: true, msg: 'Goodnight — all lights off 🌙' },
  morning:      { lights: ['light.kitchen','light.living_room'], brightness: 100, msg: 'Morning — kitchen & living room bright ☀️' },
  leaving:      { off_all: true, msg: 'Leaving — everything off 🚶' },
  welcome_home: { lights: ['light.hallway','light.living_room'], brightness: 80, msg: 'Welcome home — hallway & living on 🏡' },
};

function activateScene(name) {
  const s = SCENES[name];
  if (!s) return;
  if (s.off_all) STATE.lights.forEach(l => l.on = false);
  if (s.lights) {
    STATE.lights.forEach(l => {
      if (s.lights.includes(l.id)) { l.on = true; l.brightness = s.brightness; }
    });
  }
  if (s.off) STATE.lights.forEach(l => { if (s.off.includes(l.id)) l.on = false; });
  logConvo('Claudette', s.msg, `scene.turn_on(scene.${name})`);
  document.getElementById('sumActivity').textContent = now();
  addAlert('ok', '✅', `Scene activated: ${name}`);
  renderAll();
}

function sendCommand() {
  const inp = document.getElementById('askInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  logConvo('Mattie', text, null);
  // Simulate intent parsing (stub — in real deployment this POSTs to intent_parser)
  setTimeout(() => {
    const lower = text.toLowerCase();
    if (lower.includes('off') && lower.includes('light')) {
      allLightsOff();
      logConvo('Claudette', 'Done, all lights are off.', 'light.turn_off(all)');
    } else if (lower.includes('on') && lower.includes('light')) {
      STATE.lights.forEach(l => l.on = true);
      logConvo('Claudette', 'Done, all lights are on.', 'light.turn_on(all)');
    } else if (lower.includes('bed') || lower.includes('goodnight')) {
      activateScene('goodnight');
      logConvo('Claudette', 'Goodnight. Lights are off.', 'scene.goodnight');
    } else if (lower.includes('dinner')) {
      activateScene('dinner');
    } else if (lower.includes('morning')) {
      activateScene('morning');
    } else {
      logConvo('Claudette', `[Stub] Would parse: "${text}" → intent_parser.py`, null);
    }
    renderAll();
  }, 350);
  renderConvo();
}

function logConvo(who, text, action) {
  STATE.convo.push({ who, text, action, ts: now() });
  if (STATE.convo.length > 50) STATE.convo.shift();
  renderConvo();
}

function addAlert(type, icon, msg) {
  STATE.alerts.unshift({ type, icon, msg, ts: now() });
  if (STATE.alerts.length > 10) STATE.alerts.pop();
  renderAlerts();
}

function clearAlerts() {
  STATE.alerts = [];
  renderAlerts();
}

function clearConvo() {
  STATE.convo = [];
  renderConvo();
}

// ─────────────────────────────────────────────────────────────────────────────
// CLOCK
// ─────────────────────────────────────────────────────────────────────────────
function updateClock() {
  const el = document.getElementById('clock');
  if (el) {
    const t = new Date().toLocaleTimeString('en-GB', {
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      timeZone: 'Europe/Malta'
    });
    el.textContent = t + ' MLT';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
renderAll();
updateClock();
setInterval(updateClock, 1000);
// Simulate a sensor tick every 30s (in real mode this polls HA)
setInterval(() => {
  // small random temp jitter
  const ts = STATE.sensors.find(s => s.id.includes('temperature'));
  if (ts) ts.value = Math.round((ts.value + (Math.random()-0.5)*0.2) * 10) / 10;
  renderSensors();
  renderSummary();
}, 30000);
</script>
</body>
</html>
