<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claudette Home — Floor Plan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #0a0a0a;
      --surface:      #111111;
      --surface2:     #1a1a1a;
      --border:       #222222;
      --border-soft:  #1c1c1c;
      --text:         #e8e8e8;
      --text-dim:     #666666;
      --text-muted:   #444444;
      --accent:       #c084fc;
      --accent-glow:  rgba(192,132,252,0.15);
      --green:        #4ade80;
      --green-dim:    rgba(74,222,128,0.12);
      --yellow:       #facc15;
      --yellow-dim:   rgba(250,204,21,0.12);
      --red:          #f87171;
      --red-dim:      rgba(248,113,113,0.12);
      --blue:         #60a5fa;
      --blue-dim:     rgba(96,165,250,0.12);
      --orange:       #fb923c;
      --font-mono:    'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans:    'Inter', system-ui, -apple-system, sans-serif;
      --radius:       6px;
      --radius-lg:    12px;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    .page { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px; min-height: 56px;
      border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-family: var(--font-mono); font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: -0.3px; }
    .logo span { color: var(--text-dim); font-weight: 400; }
    .header-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--yellow); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .clock { font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); }
    .mode-badge { font-family: var(--font-mono); font-size: 10px; padding: 2px 8px; border-radius: 3px; background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(250,204,21,0.2); }
    .tab-nav { display: flex; gap: 4px; }
    .tab-nav a {
      font-family: var(--font-mono); font-size: 11px; padding: 4px 12px;
      border-radius: 4px; text-decoration: none; color: var(--text-muted);
      transition: all 0.15s;
    }
    .tab-nav a:hover { color: var(--text-dim); background: var(--surface2); }
    .tab-nav a.active { color: var(--accent); background: var(--accent-glow); }

    /* Main layout */
    .main { flex: 1; display: grid; grid-template-columns: 1fr 340px; gap: 0; overflow: hidden; }

    /* Floor plan container */
    .floor-plan-wrap {
      padding: 24px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .fp-title {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px;
    }
    .fp-container {
      position: relative;
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
    }
    .fp-container svg {
      width: 100%;
      height: auto;
    }

    /* SVG interactive styles injected via JS — hover, active glow, etc. */

    /* Right panel */
    .right-panel {
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .panel-section {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border-soft);
    }
    .panel-section:last-child { border-bottom: none; }
    .panel-label {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
    }

    /* Device detail card (shows when you click a device on the map) */
    .device-detail {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: none;
    }
    .device-detail.active { display: block; }
    .dd-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .dd-icon { font-size: 24px; }
    .dd-name { font-size: 14px; font-weight: 600; }
    .dd-entity { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .dd-state {
      display: inline-block; font-family: var(--font-mono); font-size: 10px;
      padding: 2px 8px; border-radius: 3px; margin-bottom: 12px;
    }
    .dd-state.on { background: var(--accent-glow); color: var(--accent); }
    .dd-state.off { background: var(--border); color: var(--text-muted); }
    .dd-toggle {
      width: 100%; padding: 8px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .dd-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .dd-slider { width: 100%; margin-top: 10px; }
    .dd-slider input[type=range] {
      -webkit-appearance: none; width: 100%; height: 4px;
      border-radius: 2px; background: var(--border); outline: none; cursor: pointer;
    }
    .dd-slider input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }
    .dd-slider-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-top: 4px; font-family: var(--font-mono); }

    /* Room summary cards */
    .room-summary {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .room-card {
      background: var(--surface2); border: 1px solid var(--border-soft);
      border-radius: var(--radius); padding: 10px; cursor: pointer;
      transition: all 0.15s;
    }
    .room-card:hover { border-color: var(--border); }
    .room-card.highlighted { border-color: var(--accent); background: var(--accent-glow); }
    .rc-icon { font-size: 14px; }
    .rc-name { font-size: 11px; color: var(--text); margin-top: 4px; }
    .rc-count { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }

    /* Quick stats */
    .quick-stats { display: flex; flex-direction: column; gap: 8px; }
    .qs-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0;
    }
    .qs-label { font-size: 11px; color: var(--text-dim); }
    .qs-value { font-family: var(--font-mono); font-size: 13px; font-weight: 600; }
    .qs-value.green { color: var(--green); }
    .qs-value.red { color: var(--red); }
    .qs-value.blue { color: var(--blue); }
    .qs-value.accent { color: var(--accent); }

    /* Recent activity */
    .activity-list { display: flex; flex-direction: column; gap: 6px; }
    .activity-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 6px 8px; border-radius: var(--radius);
      background: var(--bg); font-size: 11px;
    }
    .activity-icon { font-size: 12px; flex-shrink: 0; margin-top: 1px; }
    .activity-text { color: var(--text-dim); flex: 1; }
    .activity-time { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }

    /* Responsive */
    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .right-panel { display: none; }
    }

    /* Tooltip */
    .fp-tooltip {
      position: absolute;
      pointer-events: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .fp-tooltip.visible { opacity: 1; }
  </style>
</head>
<body>
<div class="page">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">Claudette<span>.home</span></div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span>DEMO MODE</span>
      </div>
    </div>
    <div class="header-right">
      <div class="tab-nav">
        <a href="index.html">Dashboard</a>
        <a href="floor-plan.html" class="active">Floor Plan</a>
      </div>
      <div class="clock" id="clock">—</div>
      <div class="mode-badge">STUB</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Floor Plan -->
    <div class="floor-plan-wrap">
      <div class="fp-title">Xagħra Townhouse — Interactive Floor Plan</div>
      <div class="fp-container" id="fpContainer">
        <!-- SVG loaded inline via JS -->
      </div>
      <div class="fp-tooltip" id="fpTooltip"></div>
    </div>

    <!-- Right panel -->
    <div class="right-panel">
      <!-- Device detail (shown on click) -->
      <div class="panel-section">
        <div class="panel-label">Selected Device</div>
        <div class="device-detail" id="deviceDetail">
          <div class="dd-header">
            <span class="dd-icon" id="ddIcon">💡</span>
            <div>
              <div class="dd-name" id="ddName">—</div>
              <div class="dd-entity" id="ddEntity">—</div>
            </div>
          </div>
          <div class="dd-state off" id="ddState">OFF</div>
          <button class="dd-toggle" id="ddToggle" onclick="toggleSelected()">Toggle</button>
          <div class="dd-slider" id="ddSlider" style="display:none">
            <input type="range" min="5" max="100" value="80" id="ddRange" oninput="setBrightness(this.value)"/>
            <div class="dd-slider-label"><span>5%</span><span id="ddPct">80%</span><span>100%</span></div>
          </div>
        </div>
        <div id="noSelection" style="color:var(--text-muted);font-size:11px">Click a device on the floor plan</div>
      </div>

      <!-- Room summary -->
      <div class="panel-section">
        <div class="panel-label">Rooms</div>
        <div class="room-summary" id="roomSummary"></div>
      </div>

      <!-- Quick stats -->
      <div class="panel-section">
        <div class="panel-label">Quick Stats</div>
        <div class="quick-stats" id="quickStats"></div>
      </div>

      <!-- Recent activity -->
      <div class="panel-section" style="flex:1">
        <div class="panel-label">Recent Activity</div>
        <div class="activity-list" id="activityList"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// STATE — mirrors SAMPLE_ENTITIES from ha_context.py
// ═══════════════════════════════════════════════════════════════════════════
const STATE = {
  devices: {
    'light.living_room':    { name:'Living Room Light',  area:'living_room',  type:'light', on:false, brightness:80, icon:'💡' },
    'light.bedroom':        { name:'Bedroom Light',      area:'bedroom',      type:'light', on:false, brightness:60, icon:'💡' },
    'light.kitchen':        { name:'Kitchen Light',      area:'kitchen',      type:'light', on:false, brightness:100,icon:'💡' },
    'light.dining_room':    { name:'Dining Room Light',  area:'dining_room',  type:'light', on:false, brightness:70, icon:'💡' },
    'light.garden':         { name:'Garden Light',       area:'outdoor',      type:'light', on:false, brightness:50, icon:'💡' },
    'light.hallway':        { name:'Hallway Light',      area:'hallway',      type:'light', on:false, brightness:40, icon:'💡' },
    'switch.tv':            { name:'TV',                 area:'living_room',  type:'switch',on:false, icon:'📺' },
    'switch.air_conditioner':{ name:'Air Conditioner',   area:'living_room',  type:'switch',on:false, icon:'❄️' },
    'switch.kettle':        { name:'Kettle',             area:'kitchen',      type:'switch',on:false, icon:'☕' },
    'switch.fan_bedroom':   { name:'Bedroom Fan',        area:'bedroom',      type:'switch',on:false, icon:'🌀' },
    'lock.front_door':      { name:'Front Door Lock',    area:'entrance',     type:'lock',  locked:true, icon:'🔒' },
    'cover.living_room_shutters':{ name:'Living Room Shutters', area:'living_room', type:'cover', open:false, icon:'▤' },
    'cover.bedroom_shutters':{ name:'Bedroom Shutters',  area:'bedroom',      type:'cover', open:false, icon:'▤' },
    'media_player.living_room_speaker':{ name:'Living Room Speaker', area:'living_room', type:'media', playing:false, icon:'🔊' },
    'media_player.bedroom_speaker':{ name:'Bedroom Speaker', area:'bedroom', type:'media', playing:false, icon:'🔊' },
  },
  sensors: {
    'sensor.living_room_temperature': { name:'Living Room Temp', area:'living_room', value:21.4, unit:'°C', icon:'🌡️' },
    'sensor.living_room_humidity':    { name:'Humidity',          area:'living_room', value:58,   unit:'%',  icon:'💧' },
    'binary_sensor.front_door_contact':{ name:'Front Door',      area:'entrance',    value:'closed', unit:'', icon:'🚪' },
    'binary_sensor.motion_living_room':{ name:'Motion (LR)',     area:'living_room', value:'clear',  unit:'', icon:'🏃' },
  },
  selected: null,
  activity: [
    { icon:'🔌', text:'Dashboard loaded in demo mode', time: timeNow() },
    { icon:'✅', text:'All pipeline tests passed', time: timeNow() },
  ],
};

const ROOMS = {
  living_room: { name:'Living Room', icon:'🛋️' },
  kitchen:     { name:'Kitchen',     icon:'🍳' },
  bedroom:     { name:'Bedroom',     icon:'🛏️' },
  dining_room: { name:'Dining Room', icon:'🕯️' },
  entrance:    { name:'Entrance',    icon:'🚪' },
  hallway:     { name:'Hallway',     icon:'🏠' },
  outdoor:     { name:'Garden',      icon:'🌿' },
};

function timeNow() {
  return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

// ═══════════════════════════════════════════════════════════════════════════
// LOAD SVG INLINE
// ═══════════════════════════════════════════════════════════════════════════
async function loadSVG() {
  try {
    const resp = await fetch('floor-plan.svg');
    const text = await resp.text();
    document.getElementById('fpContainer').innerHTML = text;
    bindSVGInteractions();
  } catch(e) {
    // Fallback: embed a simple message
    document.getElementById('fpContainer').innerHTML =
      '<div style="color:var(--text-muted);padding:40px;text-align:center;font-family:monospace">Floor plan SVG not found — place floor-plan.svg in dashboard/</div>';
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// SVG INTERACTIONS
// ═══════════════════════════════════════════════════════════════════════════
function bindSVGInteractions() {
  const svg = document.querySelector('#fpContainer svg');
  if (!svg) return;

  // Make all device groups clickable
  svg.querySelectorAll('.fp-device').forEach(g => {
    g.style.cursor = 'pointer';
    g.addEventListener('click', (e) => {
      e.stopPropagation();
      const entityId = g.dataset.entity;
      selectDevice(entityId);
    });
    g.addEventListener('mouseenter', (e) => showTooltip(e, g));
    g.addEventListener('mouseleave', hideTooltip);
  });

  // Make room zones clickable to highlight
  svg.querySelectorAll('.room-zone').forEach(rect => {
    rect.style.cursor = 'pointer';
    rect.addEventListener('click', () => {
      highlightRoom(rect.dataset.room);
    });
  });

  // Click empty space to deselect
  svg.addEventListener('click', () => {
    STATE.selected = null;
    renderDeviceDetail();
    updateSVGStates();
  });

  updateSVGStates();
}

function showTooltip(e, g) {
  const entityId = g.dataset.entity;
  const device = STATE.devices[entityId] || STATE.sensors[entityId];
  if (!device) return;

  const tooltip = document.getElementById('fpTooltip');
  let label = device.name;
  if (device.type === 'light' || device.type === 'switch') {
    label += device.on ? ' ● ON' : ' ○ OFF';
  } else if (device.type === 'lock') {
    label += device.locked ? ' 🔒' : ' 🔓';
  } else if (device.value !== undefined) {
    label += `: ${device.value}${device.unit}`;
  }

  tooltip.textContent = label;
  tooltip.classList.add('visible');

  const container = document.getElementById('fpContainer');
  const rect = container.getBoundingClientRect();
  const moveHandler = (ev) => {
    tooltip.style.left = (ev.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (ev.clientY - rect.top - 28) + 'px';
  };
  g._moveHandler = moveHandler;
  g.addEventListener('mousemove', moveHandler);
  moveHandler(e);
}

function hideTooltip(e) {
  const tooltip = document.getElementById('fpTooltip');
  tooltip.classList.remove('visible');
  if (e.currentTarget._moveHandler) {
    e.currentTarget.removeEventListener('mousemove', e.currentTarget._moveHandler);
  }
}

function updateSVGStates() {
  const svg = document.querySelector('#fpContainer svg');
  if (!svg) return;

  svg.querySelectorAll('.fp-device').forEach(g => {
    const entityId = g.dataset.entity;
    const device = STATE.devices[entityId];
    const sensor = STATE.sensors[entityId];
    const circle = g.querySelector('circle');

    // Reset
    if (circle) {
      circle.setAttribute('fill', '#1a1a1a');
      circle.setAttribute('stroke', '#333');
      circle.removeAttribute('filter');
    }

    // Selected highlight
    if (STATE.selected === entityId && circle) {
      circle.setAttribute('stroke', '#c084fc');
      circle.setAttribute('stroke-width', '2');
      circle.setAttribute('filter', 'url(#glow-accent)');
    } else if (circle) {
      circle.setAttribute('stroke-width', '1');
    }

    // Device ON state → glow
    if (device && (device.on || device.playing)) {
      if (circle) {
        circle.setAttribute('fill', '#1f1520');
        circle.setAttribute('stroke', '#c084fc');
        circle.setAttribute('filter', 'url(#glow-accent)');
      }
    }

    // Sensor values
    if (sensor) {
      const valueText = g.querySelector('.fp-value');
      if (valueText) {
        if (typeof sensor.value === 'number') {
          valueText.textContent = sensor.value + (sensor.unit === '°C' ? '°' : sensor.unit);
        } else {
          valueText.textContent = sensor.value;
          // Color: green=closed/clear, red=open/detected
          if (sensor.value === 'open' || sensor.value === 'detected') {
            valueText.setAttribute('fill', '#f87171');
          } else {
            valueText.setAttribute('fill', '#4ade80');
          }
        }
      }
    }

    // Front door sensor special
    if (entityId === 'binary_sensor.front_door_contact') {
      const doorRect = svg.querySelector('.fp-door[data-entity="binary_sensor.front_door_contact"]');
      if (doorRect && sensor) {
        doorRect.setAttribute('fill', sensor.value === 'open' ? '#f87171' : '#4ade80');
      }
    }

    // Lock state
    if (device && device.type === 'lock') {
      const icon = g.querySelector('.fp-icon');
      if (icon) icon.textContent = device.locked ? '🔒' : '🔓';
    }
  });

  // Room zones: highlight if any device is on
  svg.querySelectorAll('.room-zone').forEach(rect => {
    const room = rect.dataset.room;
    const hasActive = Object.entries(STATE.devices).some(([id, d]) =>
      d.area === room && (d.on || d.playing)
    );
    rect.setAttribute('fill', hasActive ? '#141218' : '#111');
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// DEVICE SELECTION & CONTROL
// ═══════════════════════════════════════════════════════════════════════════
function selectDevice(entityId) {
  STATE.selected = entityId;
  renderDeviceDetail();
  updateSVGStates();
}

function renderDeviceDetail() {
  const detail = document.getElementById('deviceDetail');
  const noSel = document.getElementById('noSelection');

  if (!STATE.selected) {
    detail.classList.remove('active');
    noSel.style.display = 'block';
    return;
  }

  const device = STATE.devices[STATE.selected] || STATE.sensors[STATE.selected];
  if (!device) return;

  detail.classList.add('active');
  noSel.style.display = 'none';

  document.getElementById('ddIcon').textContent = device.icon;
  document.getElementById('ddName').textContent = device.name;
  document.getElementById('ddEntity').textContent = STATE.selected;

  const stateEl = document.getElementById('ddState');
  const toggleBtn = document.getElementById('ddToggle');
  const sliderWrap = document.getElementById('ddSlider');

  if (device.type === 'light' || device.type === 'switch') {
    stateEl.textContent = device.on ? 'ON' : 'OFF';
    stateEl.className = 'dd-state ' + (device.on ? 'on' : 'off');
    toggleBtn.style.display = 'block';
    toggleBtn.textContent = device.on ? 'Turn Off' : 'Turn On';
    sliderWrap.style.display = device.type === 'light' && device.on ? 'block' : 'none';
    if (device.brightness !== undefined) {
      document.getElementById('ddRange').value = device.brightness;
      document.getElementById('ddPct').textContent = device.brightness + '%';
    }
  } else if (device.type === 'lock') {
    stateEl.textContent = device.locked ? 'LOCKED' : 'UNLOCKED';
    stateEl.className = 'dd-state ' + (device.locked ? 'on' : 'off');
    toggleBtn.style.display = 'block';
    toggleBtn.textContent = device.locked ? 'Unlock' : 'Lock';
    sliderWrap.style.display = 'none';
  } else if (device.type === 'cover') {
    stateEl.textContent = device.open ? 'OPEN' : 'CLOSED';
    stateEl.className = 'dd-state ' + (device.open ? 'on' : 'off');
    toggleBtn.style.display = 'block';
    toggleBtn.textContent = device.open ? 'Close' : 'Open';
    sliderWrap.style.display = 'none';
  } else if (device.type === 'media') {
    stateEl.textContent = device.playing ? 'PLAYING' : 'IDLE';
    stateEl.className = 'dd-state ' + (device.playing ? 'on' : 'off');
    toggleBtn.style.display = 'block';
    toggleBtn.textContent = device.playing ? 'Pause' : 'Play';
    sliderWrap.style.display = 'none';
  } else {
    // Sensor
    stateEl.textContent = `${device.value}${device.unit}`;
    stateEl.className = 'dd-state off';
    toggleBtn.style.display = 'none';
    sliderWrap.style.display = 'none';
  }
}

function toggleSelected() {
  if (!STATE.selected) return;
  const d = STATE.devices[STATE.selected];
  if (!d) return;

  if (d.type === 'light' || d.type === 'switch') {
    d.on = !d.on;
    logActivity(d.icon, `${d.on ? 'Turned on' : 'Turned off'} ${d.name}`);
  } else if (d.type === 'lock') {
    d.locked = !d.locked;
    logActivity(d.icon, `${d.locked ? 'Locked' : 'Unlocked'} ${d.name}`);
  } else if (d.type === 'cover') {
    d.open = !d.open;
    logActivity(d.icon, `${d.open ? 'Opened' : 'Closed'} ${d.name}`);
  } else if (d.type === 'media') {
    d.playing = !d.playing;
    logActivity(d.icon, `${d.playing ? 'Playing' : 'Paused'} ${d.name}`);
  }

  renderDeviceDetail();
  updateSVGStates();
  renderRoomSummary();
  renderQuickStats();
}

function setBrightness(val) {
  if (!STATE.selected) return;
  const d = STATE.devices[STATE.selected];
  if (d && d.type === 'light') {
    d.brightness = parseInt(val);
    document.getElementById('ddPct').textContent = val + '%';
  }
}

function highlightRoom(room) {
  document.querySelectorAll('.room-card').forEach(c => c.classList.remove('highlighted'));
  const card = document.querySelector(`.room-card[data-room="${room}"]`);
  if (card) card.classList.add('highlighted');
  setTimeout(() => card && card.classList.remove('highlighted'), 2000);
}

// ═══════════════════════════════════════════════════════════════════════════
// RIGHT PANEL RENDERS
// ═══════════════════════════════════════════════════════════════════════════
function renderRoomSummary() {
  const el = document.getElementById('roomSummary');
  el.innerHTML = Object.entries(ROOMS).map(([id, room]) => {
    const deviceCount = Object.values(STATE.devices).filter(d => d.area === id).length;
    const onCount = Object.values(STATE.devices).filter(d => d.area === id && (d.on || d.playing)).length;
    return `<div class="room-card" data-room="${id}" onclick="highlightRoom('${id}')">
      <span class="rc-icon">${room.icon}</span>
      <div class="rc-name">${room.name}</div>
      <div class="rc-count">${onCount}/${deviceCount} active</div>
    </div>`;
  }).join('');
}

function renderQuickStats() {
  const el = document.getElementById('quickStats');
  const lightsOn = Object.values(STATE.devices).filter(d => d.type === 'light' && d.on).length;
  const totalLights = Object.values(STATE.devices).filter(d => d.type === 'light').length;
  const temp = STATE.sensors['sensor.living_room_temperature'];
  const humidity = STATE.sensors['sensor.living_room_humidity'];
  const door = STATE.sensors['binary_sensor.front_door_contact'];
  const lock = STATE.devices['lock.front_door'];

  el.innerHTML = `
    <div class="qs-row"><span class="qs-label">Lights on</span><span class="qs-value accent">${lightsOn} / ${totalLights}</span></div>
    <div class="qs-row"><span class="qs-label">Temperature</span><span class="qs-value">${temp.value}${temp.unit}</span></div>
    <div class="qs-row"><span class="qs-label">Humidity</span><span class="qs-value blue">${humidity.value}${humidity.unit}</span></div>
    <div class="qs-row"><span class="qs-label">Front door</span><span class="qs-value ${door.value === 'open' ? 'red' : 'green'}">${door.value}</span></div>
    <div class="qs-row"><span class="qs-label">Lock</span><span class="qs-value ${lock.locked ? 'green' : 'red'}">${lock.locked ? 'Locked' : 'Unlocked'}</span></div>
  `;
}

function logActivity(icon, text) {
  STATE.activity.unshift({ icon, text, time: timeNow() });
  if (STATE.activity.length > 20) STATE.activity.pop();
  renderActivity();
}

function renderActivity() {
  const el = document.getElementById('activityList');
  el.innerHTML = STATE.activity.slice(0, 10).map(a => `
    <div class="activity-item">
      <span class="activity-icon">${a.icon}</span>
      <span class="activity-text">${a.text}</span>
      <span class="activity-time">${a.time}</span>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════════════════════
function updateClock() {
  const el = document.getElementById('clock');
  if (el) {
    el.textContent = new Date().toLocaleTimeString('en-GB', {
      hour:'2-digit', minute:'2-digit', second:'2-digit', timeZone:'Europe/Malta'
    }) + ' MLT';
  }
}

// Sensor jitter (simulated)
setInterval(() => {
  const t = STATE.sensors['sensor.living_room_temperature'];
  if (t) t.value = Math.round((t.value + (Math.random()-0.5)*0.2) * 10) / 10;
  const h = STATE.sensors['sensor.living_room_humidity'];
  if (h) h.value = Math.round(h.value + (Math.random()-0.5)*0.5);
  updateSVGStates();
  renderQuickStats();
}, 15000);

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
loadSVG();
renderRoomSummary();
renderQuickStats();
renderActivity();
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
